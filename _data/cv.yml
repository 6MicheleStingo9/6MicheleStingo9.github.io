  sections:
    summary:
      - >-
        As a Ph.D. in Computational Linguistics, my expertise lies at the
        intersection of Natural Language Processing, Large

        Language Models, and the design of intelligent agent-based systems. My
        current research focuses on the development

        of cognitive agents and multi-agent architectures, with particular
        attention to orchestration mechanisms, stateful

        reasoning, and coordination patterns implemented through frameworks such
        as LangGraph.


        A central component of my research concerns knowledge representation and
        reasoning, particularly the use of

        ontologies and graph-based models to structure and organize information
        within intelligent systems. I have practical

        experience with tools such as Protégé and Neo4j, and I explore how
        formal knowledge structures can enhance the

        capabilities of LLM-based architectures. These concepts increasingly
        inform my work on agent memory, shared state

        management, and symbolic–subsymbolic integration, enabling the design of
        systems in which language models

        interact with structured knowledge to support more reliable reasoning
        and decision-making.


        I specialize in the use of advanced prompt engineering techniques to
        fully leverage the reasoning, planning, and

        interaction capabilities of modern language models. I design prompts and
        control flows that support complex decision-

        making processes, tool usage, and inter-agent communication. My work
        actively contributes to transforming LLMs

        from simple text generators into goal-oriented components within
        structured systems.


        I work comfortably across several development environments,including
        Jupyter, Colab, Kaggle Notebooks, and

        Anaconda-based ecosystems. My previous experience includes the
        development of conversational systems using

        platforms such as IBM WatsonX and Azure Cognitive Services, providing a
        strong foundation in production-oriented AI

        solutions. I actively explore and evaluate emerging frameworks and tools
        for LLM-based applications, including

        LangChain, LangGraph, Ollama, and the Hugging Face Transformers
        ecosystem. My work is guided by continuous

        research into new scientific directions, architectural patterns, and
        methodologies aimed at building robust,

        interpretable, and scalable intelligent systems.
