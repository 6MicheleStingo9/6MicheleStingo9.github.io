  summary: Ph.D. in Computational Linguistics specialized in Natural Language Processing, Large Language Models, and intelligent multi-agent systems. My research focuses on cognitive agents, orchestration architectures, and knowledge representation through ontologies and graph-based representations, integrating structured knowledge with LLMs to support more reliable reasoning and decision-making. I work extensively with frameworks such as LangGraph and LangChain, and I actively explore open-source ecosystems including Hugging Face and Ollama for the development of scalable LLM-based applications. My expertise also includes advanced prompt engineering, agent coordination, and the design of structured AI systems capable of complex reasoning, planning, and inter-agent communication.
  
